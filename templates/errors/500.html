{% extends "base.html" %}
{% block title %}500 - 服务器错误{% endblock %}
{% block content %}
<div class="text-center py-5">
    <i class="bi bi-exclamation-triangle text-warning" style="font-size:5rem;"></i>
    <h1 class="display-1 mt-3 text-muted">500</h1>
    <p class="lead">服务器内部错误</p>
    {% if error %}
    <div class="alert alert-warning mx-auto text-start" style="max-width: 720px;">{{ error }}</div>
    {% endif %}
    <a href="/" class="btn btn-primary mt-3"><i class="bi bi-house"></i> 返回首页</a>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}健身房团课管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #1e3a5f 0%, #2c5282 100%); }
        .sidebar .nav-link { color: rgba(255,255,255,0.85); padding: 0.75rem 1rem; border-radius: 0.5rem; margin-bottom: 0.25rem; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: rgba(255,255,255,0.15); color: #fff; }
        .sidebar .nav-link i { margin-right: 0.5rem; }
        .sidebar-brand { color: #fff; padding: 1.25rem 1rem; font-size: 1.1rem; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .content-wrap { padding: 1.5rem; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
        .card-header { background-color: #fff; border-bottom: 1px solid #e9ecef; font-weight: 600; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.875rem; }
        .badge { font-weight: 500; }
        .progress { height: 8px; }
        .form-label { font-weight: 500; }
        .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .htmx-request.htmx-indicator { display: inline; }
        table th { font-size: 0.875rem; color: #6c757d; font-weight: 600; }
        table td { vertical-align: middle; }
    </style>
</head>
<body>
{% if current_user %}
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse d-md-block">
            <div class="sidebar-brand">
                <i class="bi bi-calendar2-check-fill"></i> 团课管理系统
            </div>
            <div class="nav flex-column p-2">
                <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                    <i class="bi bi-speedometer2"></i> 控制台
                </a>
                <a class="nav-link {% if '/courses' in request.path %}active{% endif %}" href="/courses">
                    <i class="bi bi-calendar-event"></i> 课程排期
                </a>
                <a class="nav-link {% if '/registrations' in request.path %}active{% endif %}" href="/registrations">
                    <i class="bi bi-person-plus"></i> 报名记录
                </a>
                <a class="nav-link {% if '/stats' in request.path %}active{% endif %}" href="/stats">
                    <i class="bi bi-bar-chart"></i> 数据统计
                </a>
                <a class="nav-link {% if '/blacklist' in request.path %}active{% endif %}" href="/blacklist">
                    <i class="bi bi-shield-lock"></i> 黑名单
                </a>
                <a class="nav-link {% if '/stores' in request.path %}active{% endif %}" href="/stores">
                    <i class="bi bi-building"></i> 门店管理
                </a>
                <a class="nav-link {% if '/classrooms' in request.path %}active{% endif %}" href="/classrooms">
                    <i class="bi bi-door-open"></i> 教室管理
                </a>
            </div>
        </nav>
        <main class="col-md-9 ms-sm-auto col-lg-10 px-0">
            <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
                <div class="container-fluid">
                    <button class="navbar-toggler d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <span class="navbar-text me-auto">
                        <i class="bi bi-calendar3"></i> {{ now.strftime('%Y年%m月%d日 %A') }}
                    </span>
                    <ul class="navbar-nav">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle"></i> {{ current_user['real_name'] or current_user['username'] }}
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="/logout"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </nav>
            <div class="content-wrap">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</div>
{% else %}
    {% block auth_content %}{% endblock %}
{% endif %}
<div class="toast-container">
    <div id="toast-notification" class="toast" role="alert">
        <div class="toast-body"></div>
    </div>
</div>
<script>
document.body.addEventListener('htmx:afterRequest', function(evt) {
    const detail = evt.detail;
    if (detail.failed && detail.xhr && detail.xhr.status === 401) {
        window.location.href = '/login';
    }
});
</script>
</body>
</html>

{% extends "base.html" %}
{% block title %}登录 - 健身房团课管理系统{% endblock %}
{% block auth_content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);">
    <div class="card shadow-lg p-4" style="width:400px;">
        <div class="text-center mb-4">
            <i class="bi bi-calendar2-check-fill" style="font-size:3rem;color:#667eea;"></i>
            <h3 class="mt-2 mb-1">团课管理系统</h3>
            <small class="text-muted">候补递补与签到冻结</small>
        </div>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" value="{{ username }}" class="form-control" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> 登录
            </button>
        </form>
        <div class="mt-3 p-3 bg-light rounded small text-muted">
            <strong>默认账号：</strong><br>
            用户名：admin &nbsp; 密码：admin
        </div>
    </div>
</div>
{% endblock %}
